name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install ruff mypy pip-audit

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true  # Gradually enforce

      - name: Run tests
        env:
          API_KEY: test-ci-key
          GOOGLE_API_KEY: dummy-key-for-ci
        run: pytest tests/ -v --tb=short

      - name: Security audit dependencies
        run: pip-audit -r requirements.txt
        continue-on-error: true  # Advisory — don't block on transitive deps

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend.Dockerfile -t ragent-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend.Dockerfile -t ragent-frontend:ci .
