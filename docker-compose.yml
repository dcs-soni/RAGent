services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      # Bind to localhost only — use a reverse proxy (nginx/ALB) for public access
      - "127.0.0.1:8000:8000"
    volumes:
      # Mount data dirs so documents and vector store persist across restarts
      - ./docs:/app/docs
      - ./chroma_db:/app/chroma_db
    env_file:
      - .env
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      # Bind to localhost only — use a reverse proxy for public access
      - "127.0.0.1:8501:8501"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
